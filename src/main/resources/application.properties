spring.application.name=careerpilot

spring.datasource.url=jdbc:postgresql://localhost:5432/careerpilot
spring.datasource.username=postgres
spring.datasource.password=ADD_YOUR_DB_PASSWORD_IN_application-local.properties

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

jwt.secret=YourVeryLongSecretKeyThatShouldBeAtLeast32CharactersLongForHS256
jwt.expiration=86400000

# ─── File Storage ────────────────────────────────────────────────────────────
file.upload-dir=uploads/resumes
file.max-size-mb=5

# ─── AI Configuration (Groq) ─────────────────────────────────────────────────
# Actual key lives in application-local.properties (gitignored)
ai.api-key=ADD_YOUR_GROQ_KEY_IN_application-local.properties
ai.api-url=https://api.groq.com/openai/v1
ai.model=llama-3.3-70b-versatile
ai.max-tokens=4096

spring.config.import=optional:classpath:application-local.properties

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR